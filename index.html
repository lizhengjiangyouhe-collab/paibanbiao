<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="档期管家">
    <meta name="application-name" content="档期管家">
    <link rel="apple-touch-icon" href="tubiao.png">
    <link rel="icon" href="tubiao.png">
    <link rel="manifest" href="manifest.json">
    <title>档期管家 - 排班与婚礼档期管理</title>

    <meta http-equiv="Cache-Control" content="public, max-age=86400">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.js"></script>

    <style>
        ::-webkit-scrollbar { display: none; }
        body {
            background-color: #F2F2F7;
            -webkit-tap-highlight-color: transparent;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Helvetica, Arial, sans-serif;
            color: #1C1C1E;
        }
        .safe-pt { padding-top: env(safe-area-inset-top); }
        .safe-pb { padding-bottom: env(safe-area-inset-bottom); }
        
        .lunar-text {
            font-size: 10px;
            white-space: nowrap;
            transform: scale(0.85);
            transform-origin: left center;
        }
        
        .glass-header {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .slide-up {
            animation: slideUp 0.4s cubic-bezier(0.32, 0.72, 0, 1) forwards;
        }
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        .fade-in {
            animation: fadeIn 0.3s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const APP_VERSION = "v3.0.0 (PWA版)";
        const STORAGE_KEY = "dangqi_guanjia_v1";

        const SHIFT_TYPES = ['W1', 'W2', 'R1', 'R2'];
        const SHIFT_LABELS = { 'W1': '上班 (第一天)', 'W2': '上班 (第二天)', 'R1': '休息 (第一天)', 'R2': '休息 (第二天)' };
        
        const LOCATIONS = {
            'xiutai': '秀太',
            'xishihui': '喜事汇',
            'other': '其他'
        };

        const saveDataToStorage = (data) => {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
            } catch (e) {
                console.error('保存数据失败:', e);
            }
        };

        const loadDataFromStorage = () => {
            try {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved) {
                    return JSON.parse(saved);
                }
            } catch (e) {
                console.error('读取数据失败:', e);
            }
            return null;
        };

        const migrateOldData = () => {
            const oldAnchor = localStorage.getItem('app_shiftAnchor');
            const oldWeddings = localStorage.getItem('app_weddings');
            const oldHolidays = localStorage.getItem('app_totalPublicHolidays');
            
            if (oldAnchor || oldWeddings) {
                const migratedData = {
                    shiftAnchor: oldAnchor ? JSON.parse(oldAnchor) : null,
                    weddings: oldWeddings ? JSON.parse(oldWeddings) : {},
                    totalPublicHolidays: oldHolidays ? Number(oldHolidays) : 0,
                    _migrated: true,
                    _version: APP_VERSION
                };
                saveDataToStorage(migratedData);
                return migratedData;
            }
            return null;
        };

        const App = () => {
            const [currentDate, setCurrentDate] = useState(new Date());
            const [shiftAnchor, setShiftAnchor] = useState(null); 
            const [weddings, setWeddings] = useState({}); 
            const [totalPublicHolidays, setTotalPublicHolidays] = useState(0);
            
            const [selectedDate, setSelectedDate] = useState(null);
            const [isDayModalOpen, setIsDayModalOpen] = useState(false);
            const [isSettingModalOpen, setIsSettingModalOpen] = useState(false);
            const [searchQuery, setSearchQuery] = useState('');
            const [showSearchResults, setShowSearchResults] = useState(false);
            const [importFile, setImportFile] = useState(null);

            useEffect(() => {
                let data = loadDataFromStorage();
                
                if (!data) {
                    data = migrateOldData();
                }
                
                if (data) {
                    if (data.shiftAnchor) setShiftAnchor(data.shiftAnchor);
                    if (data.weddings) setWeddings(data.weddings);
                    if (typeof data.totalPublicHolidays === 'number') {
                        setTotalPublicHolidays(data.totalPublicHolidays);
                    }
                }
            }, []);

            useEffect(() => {
                const data = {
                    shiftAnchor,
                    weddings,
                    totalPublicHolidays,
                    _version: APP_VERSION,
                    _lastUpdated: new Date().toISOString()
                };
                saveDataToStorage(data);
            }, [shiftAnchor, weddings, totalPublicHolidays]);

            const exportData = () => {
                const data = {
                    shiftAnchor,
                    weddings,
                    totalPublicHolidays,
                    _exportedAt: new Date().toISOString(),
                    _version: APP_VERSION
                };
                
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `档期管家备份_${new Date().toISOString().slice(0, 10)}.json`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            };

            const handleImportFileChange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        try {
                            const data = JSON.parse(event.target.result);
                            if (data.weddings) {
                                if (data.shiftAnchor) setShiftAnchor(data.shiftAnchor);
                                setWeddings(data.weddings);
                                if (typeof data.totalPublicHolidays === 'number') {
                                    setTotalPublicHolidays(data.totalPublicHolidays);
                                }
                                alert('✅ 数据导入成功！');
                            } else {
                                alert('❌ 无效的数据文件');
                            }
                        } catch (err) {
                            alert('❌ 读取文件失败');
                        }
                    };
                    reader.readAsText(file);
                }
            };

            const usedHolidays = useMemo(() => {
                return Object.values(weddings).filter(w => w.usePublicHoliday).length;
            }, [weddings]);
            const remainingHolidays = totalPublicHolidays - usedHolidays;

            const formatDate = (date) => {
                const y = date.getFullYear();
                const m = String(date.getMonth() + 1).padStart(2, '0');
                const d = String(date.getDate()).padStart(2, '0');
                return `${y}-${m}-${d}`;
            };

            const getShiftTypeForDate = (targetDateStr) => {
                if (!shiftAnchor) return null;
                const targetDate = new Date(targetDateStr);
                targetDate.setHours(0,0,0,0);
                const anchorDate = new Date(shiftAnchor.date);
                anchorDate.setHours(0,0,0,0);
                
                const diffTime = targetDate - anchorDate;
                const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
                const anchorIndex = SHIFT_TYPES.indexOf(shiftAnchor.type);
                
                let targetIndex = (anchorIndex + diffDays) % 4;
                if (targetIndex < 0) targetIndex += 4;
                
                return SHIFT_TYPES[targetIndex];
            };

            const calendarDays = useMemo(() => {
                const year = currentDate.getFullYear();
                const month = currentDate.getMonth();
                const firstDayOfMonth = new Date(year, month, 1);
                const lastDayOfMonth = new Date(year, month + 1, 0);
                
                const days = [];
                for (let i = 0; i < firstDayOfMonth.getDay(); i++) {
                    const d = new Date(year, month, -i);
                    days.unshift({ date: d, isCurrentMonth: false });
                }
                for (let i = 1; i <= lastDayOfMonth.getDate(); i++) {
                    days.push({ date: new Date(year, month, i), isCurrentMonth: true });
                }
                const remaining = 42 - days.length;
                for (let i = 1; i <= remaining; i++) {
                    days.push({ date: new Date(year, month + 1, i), isCurrentMonth: false });
                }
                return days;
            }, [currentDate]);

            const openDayModal = (dateObj) => {
                setSelectedDate(dateObj);
                setIsDayModalOpen(true);
            };

            const searchResults = useMemo(() => {
                if (!searchQuery.trim()) return [];
                
                const query = searchQuery.toLowerCase().trim();
                const results = [];
                
                Object.keys(weddings).forEach(dateStr => {
                    const wedding = weddings[dateStr];
                    let match = false;
                    
                    if (wedding.note && wedding.note.toLowerCase().includes(query)) {
                        match = true;
                    }
                    
                    if (LOCATIONS[wedding.location] && LOCATIONS[wedding.location].includes(query)) {
                        match = true;
                    }
                    
                    const date = new Date(dateStr);
                    const monthDay = `${date.getMonth() + 1}月${date.getDate()}日`;
                    const fullDate = `${date.getFullYear()}年${date.getMonth() + 1}月${date.getDate()}日`;
                    if (monthDay.includes(query) || fullDate.includes(query) || dateStr.includes(query)) {
                        match = true;
                    }
                    
                    if (match) {
                        results.push({
                            dateStr,
                            date,
                            wedding
                        });
                    }
                });
                
                return results.sort((a, b) => new Date(a.dateStr) - new Date(b.dateStr));
            }, [searchQuery, weddings]);

            const jumpToDate = (dateObj) => {
                setCurrentDate(new Date(dateObj.getFullYear(), dateObj.getMonth(), 1));
                setShowSearchResults(false);
                setSearchQuery('');
                setTimeout(() => {
                    openDayModal(dateObj);
                }, 300);
            };

            return (
                <div className="flex flex-col h-screen max-w-md mx-auto relative overflow-hidden bg-[#F2F2F7]">
                    <div className="glass-header safe-pt z-20 border-b border-gray-200/50 sticky top-0">
                        <div className="flex justify-between items-center px-4 py-3">
                            <h1 className="text-2xl font-bold tracking-tight text-black">
                                {currentDate.getMonth() + 1}月 <span className="text-lg text-gray-500 font-medium">{currentDate.getFullYear()}</span>
                            </h1>
                            <div className="flex items-center gap-3">
                                <button onClick={() => setCurrentDate(new Date())} className="text-sm font-semibold text-blue-500 active:opacity-50">
                                    今天
                                </button>
                                <div className="w-px h-4 bg-gray-300"></div>
                                <button onClick={() => setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth() - 1, 1))} className="text-blue-500 active:opacity-50">
                                    <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2.5} d="M15 19l-7-7 7-7" /></svg>
                                </button>
                                <button onClick={() => setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 1))} className="text-blue-500 active:opacity-50">
                                    <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2.5} d="M9 5l7 7-7 7" /></svg>
                                </button>
                                <button onClick={() => setIsSettingModalOpen(true)} className="ml-2 text-blue-500 active:opacity-50 bg-blue-50 p-1.5 rounded-full">
                                    <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426-1.756-2.924-1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826 2.37-2.37a1.724 1.724 0 001.066-2.572c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
                                </button>
                            </div>
                        </div>

                        <div className="px-4 pb-2">
                            <div className="relative">
                                <svg className="w-5 h-5 text-gray-400 absolute left-3 top-1/2 -translate-y-1/2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                                </svg>
                                <input 
                                    type="text" 
                                    placeholder="搜索备注、日期或地点..."
                                    value={searchQuery}
                                    onChange={(e) => {
                                        setSearchQuery(e.target.value);
                                        setShowSearchResults(e.target.value.trim() !== '');
                                    }}
                                    onFocus={() => searchQuery.trim() && setShowSearchResults(true)}
                                    className="w-full bg-gray-100/80 rounded-xl py-2.5 pl-10 pr-10 text-[15px] placeholder-gray-400 text-gray-800 focus:bg-white focus:ring-2 focus:ring-blue-500 outline-none transition-all"
                                />
                                {searchQuery && (
                                    <button 
                                        onClick={() => {
                                            setSearchQuery('');
                                            setShowSearchResults(false);
                                        }}
                                        className="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600"
                                    >
                                        <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" />
                                        </svg>
                                    </button>
                                )}
                            </div>
                        </div>

                        <div className="grid grid-cols-7 text-center pb-2 text-[11px] font-medium text-gray-400 uppercase">
                            <div className="text-red-400">日</div><div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div className="text-red-400">六</div>
                        </div>
                    </div>

                    {showSearchResults && searchResults.length > 0 && (
                        <div className="absolute top-[180px] left-0 right-0 z-[9999] bg-[#F2F2F7] max-h-[70vh] overflow-y-auto px-4 pb-4 shadow-2xl">
                            <div className="flex justify-between items-center mb-2">
                                <h3 className="text-sm font-bold text-gray-500">搜索结果 ({searchResults.length})</h3>
                                <button 
                                    onClick={() => {
                                        setShowSearchResults(false);
                                        setSearchQuery('');
                                    }}
                                    className="text-sm font-semibold text-blue-500"
                                >
                                    关闭
                                </button>
                            </div>
                            <div className="space-y-2">
                                {searchResults.map((result, index) => {
                                    const shift = getShiftTypeForDate(result.dateStr);
                                    const isWork = shift === 'W1' || shift === 'W2';
                                    
                                    return (
                                        <div 
                                            key={index}
                                            onClick={() => jumpToDate(result.date)}
                                            className="bg-white rounded-2xl p-4 shadow-sm cursor-pointer active:scale-[0.98] transition-all border border-gray-100"
                                        >
                                            <div className="flex justify-between items-start">
                                                <div className="flex-1">
                                                    <div className="flex items-center gap-2 mb-1">
                                                        <span className="text-lg font-bold text-gray-900">
                                                            {result.date.getMonth() + 1}月{result.date.getDate()}日
                                                        </span>
                                                        <span className={`text-xs font-bold px-2 py-0.5 rounded-full ${
                                                            isWork ? 'bg-blue-100 text-blue-600' : 'bg-emerald-100 text-emerald-600'
                                                        }`}>
                                                            {isWork ? '上班' : '休息'}
                                                        </span>
                                                        <span className="text-xs font-medium text-gray-400">
                                                            {LOCATIONS[result.wedding.location]}
                                                        </span>
                                                    </div>
                                                    {result.wedding.note && (
                                                        <p className="text-sm text-gray-600 line-clamp-2">
                                                            {result.wedding.note}
                                                        </p>
                                                    )}
                                                </div>
                                                <svg className="w-5 h-5 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5l7 7-7 7" />
                                                </svg>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    )}
                    {showSearchResults && searchResults.length === 0 && (
                        <div className="absolute top-[180px] left-0 right-0 z-[9999] bg-[#F2F2F7] px-4 pb-4 shadow-2xl">
                            <div className="flex justify-between items-center mb-2">
                                <h3 className="text-sm font-bold text-gray-500">搜索结果</h3>
                                <button 
                                    onClick={() => {
                                        setShowSearchResults(false);
                                        setSearchQuery('');
                                    }}
                                    className="text-sm font-semibold text-blue-500"
                                >
                                    关闭
                                </button>
                            </div>
                            <div className="bg-white rounded-2xl p-6 shadow-sm text-center">
                                <div className="text-4xl mb-3">🔍</div>
                                <p className="text-gray-500 text-sm">未找到匹配的结果</p>
                            </div>
                        </div>
                    )}

                    <div className="flex-1 overflow-y-auto px-2 pb-10 pt-2 safe-pb">
                        <div className="grid grid-cols-7 gap-1.5">
                            {calendarDays.map((dayObj, i) => {
                                const dateStr = formatDate(dayObj.date);
                                const isToday = dateStr === formatDate(new Date());
                                const shift = getShiftTypeForDate(dateStr);
                                const weddingInfo = weddings[dateStr] || {};
                                const hasWedding = weddingInfo.hasWedding;
                                
                                let lunarFullStr = '';
                                if (typeof Lunar !== 'undefined') {
                                    const lunar = Lunar.fromDate(dayObj.date);
                                    lunarFullStr = `${lunar.getMonthInChinese()}月${lunar.getDayInChinese()}`;
                                }

                                const isWork = shift === 'W1' || shift === 'W2';
                                const isRest = shift === 'R1' || shift === 'R2';

                                let cardBg = isWork ? 'bg-[#EBF5FF] border-transparent' : isRest ? 'bg-[#ECFDF5] border-transparent' : 'bg-white border-transparent';
                                let dateColor = isToday ? 'text-white' : (dayObj.date.getDay() === 0 || dayObj.date.getDay() === 6 ? 'text-red-500' : 'text-gray-900');
                                let shiftColor = isWork ? 'text-blue-400' : 'text-emerald-500';
                                let lunarColor = 'text-gray-400';
                                let weddingBadgeText = null;

                                if (hasWedding) {
                                    const locText = weddingInfo.location ? LOCATIONS[weddingInfo.location] : '婚礼';
                                    if (!isWork) {
                                        cardBg = 'bg-[#F3E8FF] border-[#D8B4FE]'; 
                                        if(!isToday) dateColor = 'text-[#6B21A8]'; 
                                        shiftColor = 'text-[#9333EA]'; 
                                        lunarColor = 'text-[#9333EA]';
                                        weddingBadgeText = <div className="text-[#6B21A8] text-[11px] font-extrabold w-full text-center mt-auto pb-0.5 tracking-wider whitespace-nowrap overflow-visible">{locText}</div>;
                                    } else if (!weddingInfo.hasSubstitute && !weddingInfo.usePublicHoliday) {
                                        cardBg = 'bg-[#FEE2E2] border-[#FCA5A5]'; 
                                        if(!isToday) dateColor = 'text-[#991B1B]'; 
                                        shiftColor = 'text-[#EF4444]'; 
                                        lunarColor = 'text-[#EF4444]';
                                        weddingBadgeText = <div className="text-[#991B1B] text-[11px] font-extrabold w-full text-center mt-auto pb-0.5 tracking-wider whitespace-nowrap overflow-visible">{locText}</div>;
                                    } else {
                                        cardBg = 'bg-[#FFEDD5] border-[#FDBA74]'; 
                                        if(!isToday) dateColor = 'text-[#9A3412]'; 
                                        shiftColor = 'text-[#F97316]'; 
                                        lunarColor = 'text-[#F97316]';
                                        
                                        let prefix = '替';
                                        if (weddingInfo.usePublicHoliday && !weddingInfo.hasSubstitute) prefix = '休';
                                        if (weddingInfo.usePublicHoliday && weddingInfo.hasSubstitute) prefix = '替/休';
                                        
                                        weddingBadgeText = <div className="text-[#9A3412] text-[11px] font-extrabold w-full text-center mt-auto pb-0.5 tracking-wider whitespace-nowrap overflow-visible">{prefix}·{locText}</div>;
                                    }
                                }

                                return (
                                    <div 
                                        key={i} 
                                        onClick={() => openDayModal(dayObj.date)}
                                        className={`relative flex flex-col p-1 h-[76px] rounded-xl transition-all active:scale-95 border ${!dayObj.isCurrentMonth ? 'opacity-40' : 'opacity-100'} ${isToday ? 'ring-2 ring-blue-500 z-10 shadow-md' : 'shadow-sm'} ${cardBg}`}
                                    >
                                        <div className="flex justify-between items-start w-full px-0.5">
                                            <div className="flex items-start gap-1">
                                                <span className={`text-[15px] font-bold ${isToday ? 'bg-blue-500 text-white rounded-full w-6 h-6 flex items-center justify-center -mt-0.5 -ml-0.5' : dateColor}`}>
                                                    {dayObj.date.getDate()}
                                                </span>
                                                {weddingInfo.note && weddingInfo.note.trim() !== '' && (
                                                    <span className="w-1.5 h-1.5 bg-[#FF9500] shadow-sm rounded-full mt-1.5"></span>
                                                )}
                                            </div>
                                            {shift && (
                                                <span className={`text-[10px] font-bold ${shiftColor}`}>
                                                    {isWork ? '班' : '休'}
                                                </span>
                                            )}
                                        </div>

                                        <div className={`w-full mt-0 pl-0.5 ${lunarColor}`}>
                                            <div className="lunar-text font-bold">{lunarFullStr}</div>
                                        </div>

                                        {weddingBadgeText}
                                    </div>
                                );
                            })}
                        </div>

                        <div className="mt-6 mx-1 p-4 bg-white/80 backdrop-blur rounded-2xl shadow-sm border border-gray-200/50">
                            <h3 className="text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-3">颜色与标记说明</h3>
                            <div className="grid grid-cols-2 gap-y-3 gap-x-2 text-[13px] text-gray-700 font-medium">
                                <div className="flex items-center gap-2">
                                    <div className="w-5 h-5 rounded-md bg-[#EBF5FF]"></div>
                                    <span>上班日</span>
                                </div>
                                <div className="flex items-center gap-2">
                                    <div className="w-5 h-5 rounded-md bg-[#ECFDF5]"></div>
                                    <span>休息日</span>
                                </div>
                                <div className="flex items-center gap-2">
                                    <div className="w-5 h-5 rounded-md bg-[#F3E8FF] border border-[#D8B4FE]"></div>
                                    <span className="truncate">接单 (休息日)</span>
                                </div>
                                <div className="flex items-center gap-2">
                                    <div className="w-5 h-5 rounded-md bg-[#FEE2E2] border border-[#FCA5A5]"></div>
                                    <span className="truncate">冲突 (需上班)</span>
                                </div>
                                <div className="flex items-center gap-2 col-span-2">
                                    <div className="w-5 h-5 rounded-md bg-[#FFEDD5] border border-[#FDBA74]"></div>
                                    <span>完美解决 (上班但已替班/公休)</span>
                                </div>
                                <div className="flex items-center gap-2 col-span-2 pt-1 border-t border-gray-100/60">
                                    <div className="w-1.5 h-1.5 bg-[#FF9500] shadow-sm rounded-full ml-1.5"></div>
                                    <span className="text-[12px] text-gray-500 ml-1.5">日期旁小圆点代表当日记有详细备注</span>
                                </div>
                                
                                <div className="col-span-2 mt-1 p-3 bg-white/60 rounded-xl flex justify-between items-center border border-gray-200/60">
                                    <div className="flex items-center gap-1.5">
                                        <span className="text-[16px]">🏖️</span>
                                        <span className="text-[13px] font-bold text-gray-700">公休余额</span>
                                    </div>
                                    <div className="flex gap-3 text-[12px]">
                                        <span className="text-gray-500">共 <span className="font-bold text-gray-800">{totalPublicHolidays}</span></span>
                                        <span className="text-gray-500">已用 <span className="font-bold text-[#F97316]">{usedHolidays}</span></span>
                                        <span className="text-gray-500">余 <span className="font-bold text-blue-600 text-[14px]">{remainingHolidays}</span></span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    {isDayModalOpen && selectedDate && (
                        <div className="absolute inset-0 z-50 flex items-end justify-center bg-black/40 backdrop-blur-sm transition-opacity fade-in">
                            <div className="absolute inset-0" onClick={() => setIsDayModalOpen(false)}></div>
                            
                            <div className="w-full bg-[#F2F2F7] rounded-t-[32px] p-5 slide-up safe-pb shadow-2xl relative flex flex-col max-h-[90vh]">
                                <div className="w-12 h-1.5 bg-gray-300 rounded-full mx-auto mb-4"></div>
                                
                                <div className="overflow-y-auto hide-scrollbar pb-6 space-y-4">
                                    {(() => {
                                        const dateStr = formatDate(selectedDate);
                                        const shift = getShiftTypeForDate(dateStr);
                                        const weddingInfo = weddings[dateStr] || { hasWedding: false, location: 'xiutai', note: '', hasSubstitute: false };
                                        const isWork = shift === 'W1' || shift === 'W2';
                                        const isRest = shift === 'R1' || shift === 'R2';
                                        
                                        let lunarModalStr = '';
                                        if (typeof Lunar !== 'undefined') {
                                            const lunarObj = Lunar.fromDate(selectedDate);
                                            lunarModalStr = `${lunarObj.getYearInChinese()}年 ${lunarObj.getMonthInChinese()}月${lunarObj.getDayInChinese()}`;
                                        }

                                        return (
                                            <>
                                                <div className="px-2">
                                                    <h2 className="text-3xl font-bold text-gray-900 tracking-tight">
                                                        {selectedDate.getMonth() + 1}月{selectedDate.getDate()}日
                                                    </h2>
                                                    <p className="text-sm text-gray-500 font-medium mt-1">
                                                        农历 {lunarModalStr}
                                                    </p>
                                                </div>

                                                <div className="bg-white rounded-2xl p-4 shadow-sm flex items-center justify-between">
                                                    <div>
                                                        <div className="text-xs text-gray-400 font-semibold mb-1 uppercase tracking-wider">当前排班</div>
                                                        <div className="text-lg font-bold text-gray-900">{shift ? SHIFT_LABELS[shift] : '未设置'}</div>
                                                    </div>
                                                    {isWork && <div className="w-10 h-10 rounded-full bg-gray-100 flex items-center justify-center text-xl">💼</div>}
                                                    {isRest && <div className="w-10 h-10 rounded-full bg-emerald-100 flex items-center justify-center text-xl">☕</div>}
                                                </div>

                                                <div className="bg-white rounded-2xl p-4 shadow-sm space-y-5">
                                                    <label className="flex items-center justify-between cursor-pointer">
                                                        <span className="text-base font-semibold text-gray-900 flex items-center gap-2">
                                                            <span className="text-xl">💍</span> 婚礼档期
                                                        </span>
                                                        <div className={`w-14 h-8 flex items-center rounded-full p-1 transition-colors duration-300 ${weddingInfo.hasWedding ? 'bg-green-500' : 'bg-gray-200'}`}>
                                                            <div className={`bg-white w-6 h-6 rounded-full shadow-md transform transition-transform duration-300 ${weddingInfo.hasWedding ? 'translate-x-6' : ''}`}></div>
                                                        </div>
                                                        <input 
                                                            type="checkbox" 
                                                            className="hidden"
                                                            checked={weddingInfo.hasWedding || false}
                                                            onChange={(e) => setWeddings(prev => ({
                                                                ...prev,
                                                                [dateStr]: { ...weddingInfo, hasWedding: e.target.checked, location: weddingInfo.location || 'xiutai' }
                                                            }))}
                                                        />
                                                    </label>

                                                    {weddingInfo.hasWedding && (
                                                        <div className="pt-4 border-t border-gray-100 space-y-4 fade-in">
                                                            
                                                            <div>
                                                                <div className="text-xs text-gray-400 font-semibold mb-2 ml-1">档期地点</div>
                                                                <div className="flex bg-[#F2F2F7] p-1 rounded-xl">
                                                                    {Object.keys(LOCATIONS).map(locKey => (
                                                                        <button
                                                                            key={locKey}
                                                                            className={`flex-1 py-1.5 text-[13px] font-semibold rounded-lg transition-all ${weddingInfo.location === locKey ? 'bg-white shadow text-gray-900' : 'text-gray-500'}`}
                                                                            onClick={() => setWeddings(prev => ({
                                                                                ...prev,
                                                                                [dateStr]: { ...weddingInfo, location: locKey }
                                                                            }))}
                                                                        >
                                                                            {LOCATIONS[locKey]}
                                                                        </button>
                                                                    ))}
                                                                </div>
                                                            </div>

                                                            <div>
                                                                <div className="text-xs text-gray-400 font-semibold mb-2 ml-1">详细备注</div>
                                                                <textarea 
                                                                    placeholder="记录新人信息、具体要求或金额..." 
                                                                    rows="3"
                                                                    className="w-full p-3 bg-[#F2F2F7] border-0 rounded-xl text-[15px] text-gray-800 placeholder-gray-400 focus:ring-2 focus:ring-blue-500 outline-none resize-none transition-all"
                                                                    value={weddingInfo.note || ''}
                                                                    onChange={(e) => setWeddings(prev => ({
                                                                        ...prev,
                                                                        [dateStr]: { ...weddingInfo, note: e.target.value }
                                                                    }))}
                                                                ></textarea>
                                                            </div>

                                                            {isWork && (() => {
                                                                const isResolved = weddingInfo.hasSubstitute || weddingInfo.usePublicHoliday;
                                                                return (
                                                                <div className={`p-4 rounded-xl ${isResolved ? 'bg-[#FFEDD5]/40 border border-[#FDBA74]/30' : 'bg-red-50 border border-red-100'}`}>
                                                                    {!isResolved ? (
                                                                        <div className="text-red-600 font-bold text-sm mb-3 flex items-center gap-2">
                                                                            <span className="text-lg">⚠️</span> 排班冲突，当日需上班！
                                                                        </div>
                                                                    ) : (
                                                                        <div className="text-[#9A3412] font-bold text-sm mb-3 flex items-center gap-2">
                                                                            <span className="text-lg">✅</span> 冲突解除，安心接单
                                                                        </div>
                                                                    )}
                                                                    
                                                                    <div className="space-y-2">
                                                                        <label className="flex items-center justify-between bg-white p-3 rounded-lg shadow-sm cursor-pointer">
                                                                            <span className="text-sm font-semibold text-gray-700">已找到人替班</span>
                                                                            <input 
                                                                                type="checkbox" 
                                                                                className="w-5 h-5 rounded border-gray-300 text-blue-500 focus:ring-blue-500"
                                                                                checked={weddingInfo.hasSubstitute || false}
                                                                                onChange={(e) => setWeddings(prev => ({
                                                                                    ...prev,
                                                                                    [dateStr]: { ...weddingInfo, hasSubstitute: e.target.checked }
                                                                                }))}
                                                                            />
                                                                        </label>
                                                                        <label className="flex items-center justify-between bg-white p-3 rounded-lg shadow-sm cursor-pointer">
                                                                            <span className="text-sm font-semibold text-gray-700">
                                                                                使用公休 <span className="text-[11px] text-gray-400 font-normal ml-1">(剩余 {remainingHolidays} 天)</span>
                                                                            </span>
                                                                            <input 
                                                                                type="checkbox" 
                                                                                className="w-5 h-5 rounded border-gray-300 text-[#F97316] focus:ring-[#F97316]"
                                                                                checked={weddingInfo.usePublicHoliday || false}
                                                                                onChange={(e) => setWeddings(prev => ({
                                                                                    ...prev,
                                                                                    [dateStr]: { ...weddingInfo, usePublicHoliday: e.target.checked }
                                                                                }))}
                                                                            />
                                                                        </label>
                                                                    </div>
                                                                </div>
                                                                );
                                                            })()}
                                                        </div>
                                                    )}
                                                </div>
                                            </>
                                        );
                                    })()}
                                </div>
                            </div>
                        </div>
                    )}

                    {isSettingModalOpen && (
                        <div className="absolute inset-0 z-50 bg-[#F2F2F7] flex flex-col fade-in">
                            <div className="glass-header safe-pt border-b border-gray-200/50">
                                <div className="flex justify-between items-center px-4 py-3 relative">
                                    <button onClick={() => setIsSettingModalOpen(false)} className="text-blue-500 font-semibold absolute left-4">完成</button>
                                    <h2 className="text-lg font-bold w-full text-center">设置</h2>
                                </div>
                            </div>
                            
                            <div className="flex-1 overflow-y-auto p-4 space-y-6">
                                <div className="bg-white rounded-2xl shadow-sm overflow-hidden">
                                    <div className="p-4 border-b border-gray-100 bg-blue-50/50">
                                        <p className="text-xs text-gray-500 font-medium">💡 规则：上2休2。请选择任意一天作为"基准日"，系统会自动算出一整年的排班。</p>
                                    </div>
                                    
                                    <div className="p-4 border-b border-gray-100 flex justify-between items-center">
                                        <span className="text-[15px] font-semibold text-gray-900">基准日期</span>
                                        <input 
                                            type="date" 
                                            className="bg-transparent text-blue-500 font-medium text-right outline-none"
                                            value={shiftAnchor ? shiftAnchor.date : formatDate(new Date())}
                                            onChange={(e) => setShiftAnchor(prev => ({ date: e.target.value, type: prev?.type || 'W1' }))}
                                        />
                                    </div>

                                    <div className="p-4 border-b border-gray-100 flex justify-between items-center">
                                        <span className="text-[15px] font-semibold text-gray-900 flex items-center gap-2">🏖️ 年度公休总天数</span>
                                        <input 
                                            type="number" 
                                            className="bg-gray-100 px-3 py-1.5 rounded-lg text-blue-500 font-bold text-right outline-none w-20"
                                            value={totalPublicHolidays}
                                            onChange={(e) => setTotalPublicHolidays(Number(e.target.value) || 0)}
                                            placeholder="例: 10"
                                        />
                                    </div>

                                    <div className="p-4">
                                        <span className="text-[15px] font-semibold text-gray-900 block mb-3">这一天是？</span>
                                        <div className="grid grid-cols-2 gap-2">
                                            {SHIFT_TYPES.map(type => (
                                                <button
                                                    key={type}
                                                    onClick={() => setShiftAnchor(prev => ({ date: prev?.date || formatDate(new Date()), type: type }))}
                                                    className={`py-2.5 rounded-xl text-[13px] font-bold transition-all ${
                                                        shiftAnchor?.type === type 
                                                        ? 'bg-blue-500 text-white shadow-md' 
                                                        : 'bg-gray-100 text-gray-600'
                                                    }`}
                                                >
                                                    {SHIFT_LABELS[type]}
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                </div>

                                <div className="bg-white rounded-2xl shadow-sm overflow-hidden">
                                    <div className="p-4 border-b border-gray-100 bg-green-50/50">
                                        <p className="text-xs text-gray-500 font-medium">📦 数据备份与恢复</p>
                                    </div>
                                    
                                    <div className="p-4 space-y-3">
                                        <button 
                                            onClick={exportData}
                                            className="w-full py-3 bg-green-500 text-white rounded-xl font-bold active:opacity-80 transition-all"
                                        >
                                            📤 导出数据
                                        </button>
                                        
                                        <div>
                                            <input 
                                                type="file" 
                                                accept=".json"
                                                className="hidden"
                                                id="import-file"
                                                onChange={handleImportFileChange}
                                            />
                                            <label 
                                                htmlFor="import-file"
                                                className="block w-full py-3 bg-blue-500 text-white rounded-xl font-bold text-center cursor-pointer active:opacity-80 transition-all"
                                            >
                                                📥 导入数据
                                            </label>
                                        </div>
                                    </div>
                                </div>

                                <div className="bg-white rounded-2xl shadow-sm p-4 text-center">
                                    <p className="text-xs text-gray-400">{APP_VERSION}</p>
                                    <p className="text-[10px] text-gray-300 mt-1">PWA离线模式已开启</p>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(err => {
                    console.log('ServiceWorker registration failed:', err);
                });
            });
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
